spring:
  application:
    name: shorturl

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/shorturldb}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:change-me}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
  web:
    error:
      include-stacktrace: never

server:
  port: 8081
logging:
  file:
    name: logs/application.log